name: hdbscan
channels:
  - conda-forge
  - rapidsai
  - nvidia
  - bioconda
  - defaults
dependencies:
  - snakemake
  - python=3.12.0
  - cuml=25.02
  - 'cuda-version>=12.0,<=12.8'
  - prodigal>=2.6.3
  - checkm2
  - pip

  - pip:
    - kneaddata
    - vamb
    - numpy
    - biopython
    - scikit-learn
