name: hdbscan

channels:
  - conda-forge
  - rapidsai
  - nvidia
  - bioconda
  - defaults
dependencies:
  - snakemake
  - checkm2=1.1.0
  - python>=3.12.0
  - 'cuda-version>=12.0,<=12.8'
  - pip

  - pip:
    - kneaddata
    - vamb
    - numpy
    - biopython
    - scikit-learn
    - cuml-cu12==25.2.* --extra-index-url https://pypi.nvidia.com
