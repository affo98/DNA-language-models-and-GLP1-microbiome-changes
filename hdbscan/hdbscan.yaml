name: hdbscan

channels:
  - conda-forge
  - rapidsai
  - nvidia
  - bioconda
  - defaults
dependencies:
  - snakemake
  - checkm2=1.1.0
  - cuml=25.02
  - python>=3.12.0
  - cuda-version>=12.0,<=12.8
  - pip

  - pip:
    - vamb
    - numpy
    - biopython
    - scikit-learn
    - matplotlib
    - pandas
    - seaborn
    # - cuml-cu12==25.2.* --extra-index-url https://pypi.nvidia.com
